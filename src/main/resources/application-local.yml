# "local" 프로파일 - 로컬 PC의 Ollama(CPU 또는 소형 GPU)를 쓸 때 설정.
# 활성화 방법: SPRING_PROFILES_ACTIVE=local (application.yml 기본값이 "local"이라
# 아무것도 안 정해도 이 프로파일이 그대로 적용된다.)
#
# 여기 있는 값들은 지금까지 application.yml에 있던 것과 동일하다 - 서버/RAG 튜닝값이
# 환경마다 달라져서 이 파일로 옮긴 것뿐, 로컬 개발 동작은 바뀌지 않는다.
#
# .env.local(프로젝트 루트, git에는 안 올라감)에 이 프로파일 전용 값(OLLAMA_CHAT_API_KEY 등)을
# 따로 둘 수 있다. local 프로파일이 활성화될 때만 같이 로드된다.
spring:
  config:
    import: optional:file:.env.local[.properties]

embedding:
  active-profile: ${EMBEDDING_PROFILE:bgem3}

langchain4j:
  ollama:
    chat-model:
      base-url: ${OLLAMA_CHAT_BASE_URL:http://localhost:31434}
      api-key: ${OLLAMA_CHAT_API_KEY:}
      api-type: ${OLLAMA_CHAT_API_TYPE:ollama}        # API 규격: (ollama, openai)
      model-name: ${OLLAMA_CHAT_MODEL_NAME:}
      temperature: 0.4
      timeout: 300s
      num-ctx: ${OLLAMA_CHAT_NUM_CTX:8192}
    embedding-model:
      base-url: ${OLLAMA_EMBEDDING_BASE_URL:http://localhost:31434}
      api-key: ${OLLAMA_EMBEDDING_API_KEY:}
      api-type: ${OLLAMA_EMBEDDING_API_TYPE:ollama}   # API 규격: (ollama, openai)
      model-name: ${embedding.profiles.${embedding.active-profile}.model-name}

# RAG 설정
rag:
  similarity:
    threshold: 0.50   # 유사도 임계값 (0.0 ~ 1.0)
  top-k: 3

  query-compression:
    enabled: true

  retrieval:
    overfetch-multiplier: 3
    min-chunk-length: 250

    # 하이브리드 검색(dense 벡터 + lexical pg_trgm, RRF 융합) 설정
    hybrid:
      # lexical(pg_trgm)이 한국어 문법적 어미 패턴까지 매칭해 무관한 문서를 끌어올리는
      # 문제가 gemma/bgem3 두 임베딩 프로필 모두, 가중치를 낮춰도 반복 확인돼 껐다.
      enabled: false
      weight:
        dense: 1.0
        lexical: 0.2
      top-k: 3
      lexical:
        word-similarity-threshold: 0.10

  # RAG 검색 감사 로그(rag_retrieval_logs, EgovLoggingContentRetriever가 기록) 관련 설정.
  retrieval-log:
    delete-with-session: true
