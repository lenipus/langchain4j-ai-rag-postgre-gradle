server:
  port: ${SERVER_PORT:8081}
  
spring:
  application:
    name: langchain4j-ai-rag-postgre

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB

  # PostgreSQL 데이터베이스 설정
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:35432}/ragdb
    username: ${POSTGRES_USER:tester}
    password: ${POSTGRES_PASSWORD:test123#}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  # 빈 오버라이딩 허용
  main:
    allow-bean-definition-overriding: true

# # 애플리케이션 설정
# app:
#   # ONNX 임베딩 모델 설정 파일 경로
#   # 외부 JSON 파일에서 모델 및 토크나이저 파일 경로를 로드
#   # Windows 예: C:/Users/{username}/langchain4j-config/embeddingConfig.json
#   # Linux/Mac 예: /home/{username}/langchain4j-config/embeddingConfig.json
#   embedding-config-path: ${EMBEDDING_MODEL_PATH:D:/VSCODE/rag/onnx-uv/model}/embeddingConfig.json
#
#   관련 파일 (임베딩 Ollama 전환으로 전부 주석 처리됨):
#   - src/main/java/com/example/chat/util/ConfigUtils.java
#       : 이 프로퍼티(app.embedding-config-path)를 @Value로 주입받아 JSON 설정 파일을 읽던 유틸리티. 현재 전체 주석 처리됨.
#   - src/main/java/com/example/chat/config/EgovLangChain4jConfig.java
#       : ConfigUtils.loadConfig()를 호출해 modelPath/tokenizerPath를 읽고 OnnxEmbeddingModel을 생성하던 로직. 현재 전체 주석 처리됨.
#   - src/main/java/com/example/chat/config/EgovEmbeddingConfig.java
#       : 위 JSON 파일(embeddingConfig.json)을 역직렬화하는 DTO (modelPath, tokenizerPath 등).
#   - k8s/configmap.yaml, k8s/README.md
#       : APP_EMBEDDING_CONFIG_PATH 환경 변수로 이 값을 주입하던 k8s 설정/문서.

# LangChain4j Ollama 설정
# 채팅(LLM)과 임베딩은 서로 완전히 독립적으로 로컬/원격 전환 가능.
# api-type이 실제 API 규격을 결정한다: ollama(네이티브, 기본값) | openai(OpenAI 호환, base-url에 /v1 포함해서 설정)
langchain4j:
  ollama:
    # ===== 채팅(LLM) =====
    chat-model:
      base-url: ${OLLAMA_CHAT_BASE_URL:http://localhost:31434}
      api-key: ${OLLAMA_CHAT_API_KEY:}
      api-type: ${OLLAMA_CHAT_API_TYPE:ollama}
      model-name: ${OLLAMA_CHAT_MODEL_NAME:}
      temperature: 0.4
      timeout: 60s
      # 컨텍스트 윈도우(num_ctx). Ollama 네이티브(api-type=ollama)일 때만 적용, 0이면 Ollama 기본값 사용
      num-ctx: ${OLLAMA_CHAT_NUM_CTX:0}
    # ===== 임베딩 (채팅과 별개 서버 지정 가능, 기본은 로컬) =====
    embedding-model:
      base-url: ${OLLAMA_EMBEDDING_BASE_URL:http://localhost:31434}
      api-key: ${OLLAMA_EMBEDDING_API_KEY:}
      api-type: ${OLLAMA_EMBEDDING_API_TYPE:ollama}
      model-name: ${OLLAMA_EMBEDDING_MODEL_NAME:embeddinggemma:300m}

# PGVector 설정
pgvector:
  # 벡터 저장소 테이블 설정
  table-name: document_embeddings
  # 벡터 차원 (ko-sroberta-multitask 모델의 출력 차원)
  dimension: 768
  # 인덱스 생성 여부
  create-table: true
  # 거리 측정 방식 (cosine, euclidean, inner_product)
  distance-type: cosine

# 문서 처리 설정
document:
  # 업로드 허용 확장자 (콤마 구분). 프론트(업로드 파일 선택창/검증)와 백엔드 검증이
  # 모두 이 값 하나만 보고 동작한다 - 확장자 추가/제거는 여기 한 줄만 고치면 된다.
  allowed-upload-extensions: .md,.pdf,.docx,.hwp,.hwpx,.txt,.json

  # 문서 경로 설정
  upload-dir: ${DOCUMENT_UPLOAD_PATH:D:/app/rag/upload}/data
  path: file:${DOCUMENT_UPLOAD_PATH:D:/app/rag/upload}/data/**/*.md
  pdf-path: file:${DOCUMENT_UPLOAD_PATH:D:/app/rag/upload}/data/**/*.pdf
  docx-path: file:${DOCUMENT_UPLOAD_PATH:D:/app/rag/upload}/data/**/*.docx
  hwp-path: file:${DOCUMENT_UPLOAD_PATH:D:/app/rag/upload}/data/**/*.hwp
  hwpx-path: file:${DOCUMENT_UPLOAD_PATH:D:/app/rag/upload}/data/**/*.hwpx
  txt-path: file:${DOCUMENT_UPLOAD_PATH:D:/app/rag/upload}/data/**/*.txt
  # 고정 스키마(제목/원본파일명/구축일자/게시일자/키워드/내용) JSON 문서 전용 경로
  json-path: file:${DOCUMENT_UPLOAD_PATH:D:/app/rag/upload}/data/**/*.json

  # PDF 리더 설정
  pdf:
    page-top-margin: 0
    pages-per-document: 1

  # 문서 변환 설정
  # 청크 크기 설정 (토큰 단위)
  chunk-size: 4000

  # 최소 청크 크기 (문자 단위)
  min-chunk-size-chars: 350

  # 최대 청크 수
  max-num-chunks: 500

  # 임베딩할 최소 청크 길이
  min-chunk-length-to-embed: 250

  # 문서 정규화 설정
  normalization:
    # 정규화 기능 활성화 여부
    enabled: true
    # HTML 태그 제거 여부
    remove-html-tags: true
    # 마크다운 코드 블록 제거 여부
    remove-code-blocks: false
    # 공백 정규화 여부
    normalize-whitespace: true
    # 줄바꿈 정규화 여부
    normalize-newlines: true
    # 특수문자 정리 여부
    clean-special-chars: true

# RAG 설정
rag:
  enable-query-compression: false

  # RAG 유사도 임계값 설정 (0.0 ~ 1.0)
  similarity:
    threshold: 0.60

  # RAG 검색 결과 개수 (Top K)
  top-k: 5

  # 하이브리드 검색(dense 벡터 + lexical pg_trgm, RRF 융합) 설정
  retrieval:
    hybrid:
      # 활성화 여부. dense 단독 검색에서 다주제 혼합 청크(예: 여러 결재라인이 한 청크에
      # 뭉친 안내자료)가 특정 질의에 뾰족하게 반응하지 못해 상위 top-k 밖으로 밀려나는
      # 사례가 확인되어 켠다. lexical(정확 단어 매칭)이 이런 경우를 보완한다.
      enabled: true
      # 채널 가중치
      weight:
        dense: 1.0
        lexical: 1.0
      # 융합 결과 개수. 실제 코퍼스 측정상 정답 청크가 lexical 랭킹 3~4위에 걸리는 사례가
      # 있어 3에서 상향. 미설정 시 rag.top-k 값을 사용.
      top-k: 10
      # lexical(pg_trgm word_similarity) 임계값. `%>` 연산자가 참조하는 GUC
      # pg_trgm.word_similarity_threshold(기본 0.6)는 한국어 긴 청크에 과도하게 엄격하다.
      # 실제 운영 코퍼스(다주제 혼합 청크 포함)를 직접 질의해 측정한 결과, 정답 청크의
      # word_similarity가 0.13~0.15 수준으로 낮게 나와 0.30에서는 `%>` 필터에서 아예
      # 걸러졌다(후보군 진입 자체가 안 됨). 실측값보다 낮은 0.10으로 낮춰 후보군에는
      # 들어오게 하되, RRF 융합·top-k(6)가 최종 필터링을 담당하게 한다. 트랜잭션 스코프로만
      # 적용되어 커넥션 풀에 누수되지 않는다. recall을 더 원하면 하향(노이즈↑), 정밀도를
      # 원하면 상향한다.
      lexical:
        word-similarity-threshold: 0.30

# 채팅 메모리 설정
chat:
  memory:
    # 최대 메시지 수
    max-messages: 20
    # PostgreSQL 테이블명
    table-name: chat_memory

# 세션 관리 설정
session:
  # PostgreSQL 테이블명
  table-name: chat_sessions

# 로깅 설정
logging:
  level:
    com.example.chat: DEBUG
    dev.langchain4j: INFO
    ai.djl: WARN
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
