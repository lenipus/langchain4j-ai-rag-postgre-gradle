<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 생성 도구</title>
    <link rel="stylesheet" href="/css/sqlgen.css?v=6">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>SQL 생성 도구</h1>
            <a href="/" class="back-link">← 채팅으로 돌아가기</a>
        </div>
        <p class="page-desc">
            DB 연결 정보를 등록하고, 테이블을 선택한 뒤 원하는 내용을 자연어로 설명하면 SQL 쿼리를 생성합니다.
            <strong>생성된 SQL은 자동으로 실행되지 않으며, 직접 검토 후 사용해야 합니다.</strong>
        </p>

        <div class="layout">
            <div class="layout-left">
                <section class="card">
                    <h2>1. DB 연결 선택</h2>
                    <div class="row">
                        <select id="connection-select" onchange="onConnectionChange()">
                            <option value="">연결을 선택하세요...</option>
                        </select>
                        <button class="btn" onclick="openConnectionModal()">+ 새연결</button>
                        <button class="btn btn-danger" id="delete-connection-btn" onclick="deleteSelectedConnection()" disabled>연결삭제</button>
                    </div>
                </section>

                <section class="card card-grow">
                    <div class="section-header-row">
                        <h2>2. 테이블 선택 <span id="selected-tables-count" class="selected-tables-count"></span></h2>
                        <div class="section-header-actions">
                            <button class="btn btn-small btn-danger" id="clear-selected-tables-btn" onclick="clearSelectedTables()" disabled>Clear</button>
                            <button class="btn btn-small" id="toggle-table-picker-btn" onclick="openTablePickerModal()" disabled>+ 추가</button>
                        </div>
                    </div>

                    <div id="selected-tables" class="selected-tables">
                        <span class="placeholder">선택된 테이블이 없습니다.</span>
                    </div>
                </section>
            </div>

            <div class="layout-right">
                <section class="card sql-chat-card">
                    <h2>3. 질의 &amp; 결과</h2>

                    <div id="sql-history" class="sql-history">
                        <span class="placeholder">아직 생성된 SQL이 없습니다.</span>
                    </div>

                    <div class="sql-chat-input-row">
                        <textarea id="nl-request" rows="3" placeholder="예: 최근 7일간 가입한 사용자 수를 보여줘"
                                  onkeydown="handleSqlRequestKeyPress(event)"></textarea>
                        <button class="btn btn-primary" id="generate-btn" onclick="generateSql()">SQL 생성</button>
                    </div>
                    <span id="generate-status" class="status-text"></span>
                </section>
            </div>
        </div>
    </div>

    <!-- 새 DB 연결 등록 팝업(레이어) -->
    <div id="connection-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>새 DB 연결 등록</h3>
                <button class="modal-close" onclick="closeConnectionModal()">&times;</button>
            </div>
            <div class="modal-body">
                <label>연결 이름</label>
                <input type="text" id="modal-name" placeholder="예: 운영 DB">

                <label>DBMS</label>
                <select id="modal-dbms" onchange="onDbmsChange()">
                    <option value="postgresql">PostgreSQL</option>
                    <option value="mariadb">MariaDB / MySQL</option>
                    <option value="oracle">Oracle</option>
                </select>

                <div class="modal-row">
                    <div class="modal-col">
                        <label>호스트</label>
                        <input type="text" id="modal-host" placeholder="예: 127.0.0.1" oninput="updateJdbcPreview()">
                    </div>
                    <div class="modal-col modal-col-small">
                        <label>포트</label>
                        <input type="text" id="modal-port" placeholder="5432" oninput="updateJdbcPreview()">
                    </div>
                </div>

                <div id="oracle-mode-row" class="modal-row" style="display:none;">
                    <label class="radio-label"><input type="radio" name="oracle-mode" value="sid" checked onchange="onDbmsChange()"> SID</label>
                    <label class="radio-label"><input type="radio" name="oracle-mode" value="service" onchange="onDbmsChange()"> 서비스명</label>
                </div>

                <label id="modal-dbname-label">DB 이름</label>
                <input type="text" id="modal-dbname" placeholder="예: mydb" oninput="updateJdbcPreview()">

                <label>사용자명</label>
                <input type="text" id="modal-username">

                <label>비밀번호</label>
                <input type="password" id="modal-password">

                <div class="jdbc-preview">
                    <label>생성된 JDBC URL</label>
                    <div id="modal-jdbc-preview" class="jdbc-preview-text">-</div>
                </div>

                <div class="modal-actions">
                    <button class="btn" onclick="testModalConnection()">테스트 접속</button>
                    <button class="btn btn-primary" onclick="submitRegisterConnection()">등록</button>
                </div>
                <div id="modal-status" class="status-text modal-status-text"></div>
            </div>
        </div>
    </div>

    <!-- 테이블 추가 팝업(레이어) -->
    <div id="table-picker-modal" class="modal-overlay" style="display:none;">
        <div class="modal modal-wide">
            <div class="modal-header">
                <h3>테이블 추가</h3>
                <button class="modal-close" onclick="closeTablePickerModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="table-search" class="table-search" placeholder="테이블명/설명 검색..."
                       oninput="renderTableList()">

                <div id="table-list" class="table-list">
                    <span class="placeholder">먼저 DB 연결을 선택하세요.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DBMS별 기본 포트
        const DEFAULT_PORTS = { postgresql: '5432', mariadb: '3306', oracle: '1521' };

        // 전체 선택 시 이 개수를 넘으면 경고 확인창을 띄운다 - 테이블이 많으면 스키마 전체가
        // LLM 프롬프트에 통째로 들어가 느려지거나 컨텍스트 한도를 넘길 수 있어서다.
        const SELECT_ALL_WARN_THRESHOLD = 15;

        let connections = [];
        let allTables = []; // 현재 선택된 연결의 전체 테이블 목록 ({name, comment})
        let selectedTables = new Set();

        document.addEventListener('DOMContentLoaded', loadConnections);

        function loadConnections() {
            fetch('/api/sqlgen/connections')
                .then(res => res.json())
                .then(data => {
                    connections = data;
                    const select = document.getElementById('connection-select');
                    select.innerHTML = '<option value="">연결을 선택하세요...</option>';
                    connections.forEach(conn => {
                        const option = document.createElement('option');
                        option.value = conn.id;
                        option.textContent = `${conn.name} (${conn.jdbcUrl})`;
                        select.appendChild(option);
                    });
                })
                .catch(err => console.error('연결 목록 조회 실패:', err));
        }

        // ===== 새 연결 등록 팝업 =====

        function openConnectionModal() {
            document.getElementById('modal-name').value = '';
            document.getElementById('modal-dbms').value = 'postgresql';
            document.getElementById('modal-host').value = '';
            document.getElementById('modal-port').value = DEFAULT_PORTS.postgresql;
            document.getElementById('modal-dbname').value = '';
            document.getElementById('modal-username').value = '';
            document.getElementById('modal-password').value = '';
            document.getElementById('modal-status').textContent = '';
            document.getElementById('modal-status').className = 'status-text';
            document.querySelector('input[name="oracle-mode"][value="sid"]').checked = true;
            onDbmsChange();
            document.getElementById('connection-modal').style.display = 'flex';
        }

        function closeConnectionModal() {
            document.getElementById('connection-modal').style.display = 'none';
        }

        // DBMS 선택이 바뀌면 포트 기본값/라벨/Oracle 전용 필드 표시 여부를 갱신하고 URL을 다시 만든다
        function onDbmsChange() {
            const dbms = document.getElementById('modal-dbms').value;
            document.getElementById('modal-port').value = DEFAULT_PORTS[dbms];

            const isOracle = dbms === 'oracle';
            document.getElementById('oracle-mode-row').style.display = isOracle ? 'flex' : 'none';
            document.getElementById('modal-dbname-label').textContent = isOracle ? 'SID 또는 서비스명' : 'DB 이름';
            document.getElementById('modal-dbname').placeholder = isOracle ? '예: ORCL 또는 ORCLPDB1' : '예: mydb';

            updateJdbcPreview();
        }

        // 입력된 필드들로부터 JDBC URL을 조립해 미리보기에 표시한다
        function updateJdbcPreview() {
            const dbms = document.getElementById('modal-dbms').value;
            const host = document.getElementById('modal-host').value.trim();
            const port = document.getElementById('modal-port').value.trim();
            const dbName = document.getElementById('modal-dbname').value.trim();
            const previewEl = document.getElementById('modal-jdbc-preview');

            if (!host || !port || !dbName) {
                previewEl.textContent = '-';
                return '';
            }

            let jdbcUrl;
            if (dbms === 'postgresql') {
                jdbcUrl = `jdbc:postgresql://${host}:${port}/${dbName}`;
            } else if (dbms === 'mariadb') {
                jdbcUrl = `jdbc:mariadb://${host}:${port}/${dbName}`;
            } else {
                const oracleMode = document.querySelector('input[name="oracle-mode"]:checked').value;
                jdbcUrl = oracleMode === 'service'
                    ? `jdbc:oracle:thin:@${host}:${port}/${dbName}`
                    : `jdbc:oracle:thin:@${host}:${port}:${dbName}`;
            }

            previewEl.textContent = jdbcUrl;
            return jdbcUrl;
        }

        function readModalConnectionInput() {
            const name = document.getElementById('modal-name').value.trim();
            const username = document.getElementById('modal-username').value.trim();
            const password = document.getElementById('modal-password').value;
            const jdbcUrl = updateJdbcPreview();
            return { name, jdbcUrl, username, password };
        }

        function testModalConnection() {
            const { jdbcUrl, username } = readModalConnectionInput();
            const statusEl = document.getElementById('modal-status');

            if (!jdbcUrl || !username) {
                statusEl.textContent = '호스트/포트/DB 이름/사용자명을 모두 입력하세요.';
                statusEl.className = 'status-text error';
                return;
            }

            statusEl.textContent = '접속 테스트 중...';
            statusEl.className = 'status-text';

            fetch('/api/sqlgen/test-connection', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jdbcUrl, username, password: document.getElementById('modal-password').value })
            })
                .then(res => res.json().then(body => ({ ok: res.ok, body })))
                .then(({ ok, body }) => {
                    if (!ok) {
                        statusEl.textContent = body.error || '접속 실패';
                        statusEl.className = 'status-text error';
                        return;
                    }
                    statusEl.textContent = '접속 성공';
                    statusEl.className = 'status-text success';
                })
                .catch(err => {
                    statusEl.textContent = '접속 테스트 중 오류: ' + err.message;
                    statusEl.className = 'status-text error';
                });
        }

        function submitRegisterConnection() {
            const { name, jdbcUrl, username, password } = readModalConnectionInput();
            const statusEl = document.getElementById('modal-status');

            if (!name || !jdbcUrl || !username) {
                statusEl.textContent = '연결 이름/호스트/포트/DB 이름/사용자명을 모두 입력하세요.';
                statusEl.className = 'status-text error';
                return;
            }

            statusEl.textContent = '접속 확인 후 등록 중...';
            statusEl.className = 'status-text';

            fetch('/api/sqlgen/connections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, jdbcUrl, username, password })
            })
                .then(res => res.json().then(body => ({ ok: res.ok, body })))
                .then(({ ok, body }) => {
                    if (!ok) {
                        statusEl.textContent = body.error || '등록 실패';
                        statusEl.className = 'status-text error';
                        return;
                    }
                    loadConnections();
                    closeConnectionModal();
                })
                .catch(err => {
                    statusEl.textContent = '등록 중 오류: ' + err.message;
                    statusEl.className = 'status-text error';
                });
        }

        function deleteSelectedConnection() {
            const connectionId = document.getElementById('connection-select').value;
            if (!connectionId) return;
            if (!confirm('이 연결 정보를 삭제하시겠습니까?')) return;

            fetch(`/api/sqlgen/connections/${connectionId}`, { method: 'DELETE' })
                .then(() => {
                    document.getElementById('table-list').innerHTML = '<span class="placeholder">먼저 DB 연결을 선택하세요.</span>';
                    document.getElementById('table-search').value = '';
                    document.getElementById('toggle-table-picker-btn').disabled = true;
                    closeTablePickerModal();
                    allTables = [];
                    selectedTables.clear();
                    renderSelectedTables();
                    loadConnections();
                })
                .catch(err => console.error('연결 삭제 실패:', err));
        }

        // 테이블 검색창 + 목록을 팝업(레이어)으로 띄운다.
        function openTablePickerModal() {
            document.getElementById('table-picker-modal').style.display = 'flex';
        }

        function closeTablePickerModal() {
            document.getElementById('table-picker-modal').style.display = 'none';
        }

        function onConnectionChange() {
            const connectionId = document.getElementById('connection-select').value;
            const deleteBtn = document.getElementById('delete-connection-btn');
            const toggleBtn = document.getElementById('toggle-table-picker-btn');
            const searchEl = document.getElementById('table-search');
            const tableListEl = document.getElementById('table-list');
            allTables = [];
            selectedTables.clear();
            searchEl.value = '';
            renderSelectedTables();
            closeTablePickerModal();

            if (!connectionId) {
                deleteBtn.disabled = true;
                toggleBtn.disabled = true;
                tableListEl.innerHTML = '<span class="placeholder">먼저 DB 연결을 선택하세요.</span>';
                return;
            }

            deleteBtn.disabled = false;
            tableListEl.innerHTML = '<span class="placeholder">테이블 목록을 불러오는 중...</span>';

            fetch(`/api/sqlgen/connections/${connectionId}/tables`)
                .then(res => res.json().then(body => ({ ok: res.ok, body })))
                .then(({ ok, body }) => {
                    if (!ok) {
                        toggleBtn.disabled = true;
                        tableListEl.innerHTML = `<span class="placeholder error">${body.error}</span>`;
                        return;
                    }
                    allTables = body;
                    toggleBtn.disabled = false;
                    renderTableList();
                })
                .catch(err => {
                    toggleBtn.disabled = true;
                    tableListEl.innerHTML = `<span class="placeholder error">테이블 조회 오류: ${err.message}</span>`;
                });
        }

        // 검색어로 걸러진 테이블 목록을 체크박스로 그린다. 선택 상태(selectedTables)는
        // 검색으로 목록이 바뀌어도 유지된다.
        function renderTableList() {
            const tableListEl = document.getElementById('table-list');
            const keyword = document.getElementById('table-search').value.trim().toLowerCase();

            if (allTables.length === 0) {
                tableListEl.innerHTML = '<span class="placeholder">조회 가능한 테이블이 없습니다.</span>';
                return;
            }

            const filtered = allTables.filter(t =>
                !keyword ||
                t.name.toLowerCase().includes(keyword) ||
                (t.comment && t.comment.toLowerCase().includes(keyword)));

            if (filtered.length === 0) {
                tableListEl.innerHTML = '<span class="placeholder">검색 결과가 없습니다.</span>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'table-list-table';

            // 검색된(현재 화면에 보이는) 테이블 전체를 한 번에 선택/해제한다.
            const selectAllCheckbox = document.createElement('input');
            selectAllCheckbox.type = 'checkbox';
            selectAllCheckbox.title = '검색된 테이블 전체 선택/해제';
            selectAllCheckbox.checked = filtered.every(t => selectedTables.has(t.name));
            selectAllCheckbox.onclick = (event) => {
                event.stopPropagation();
                if (selectAllCheckbox.checked && filtered.length > SELECT_ALL_WARN_THRESHOLD) {
                    const proceed = confirm(
                        `테이블 ${filtered.length}개를 한꺼번에 선택하시겠습니까?\n` +
                        '선택한 테이블 전체의 스키마가 LLM에 통째로 전달되어 프롬프트가 커지고 응답이 느려지거나 실패할 수 있습니다.');
                    if (!proceed) {
                        selectAllCheckbox.checked = false;
                        return;
                    }
                }
                filtered.forEach(t => {
                    if (selectAllCheckbox.checked) {
                        selectedTables.add(t.name);
                    } else {
                        selectedTables.delete(t.name);
                    }
                });
                renderSelectedTables();
                renderTableList();
            };

            const theadRow = document.createElement('tr');
            const selectAllTh = document.createElement('th');
            selectAllTh.className = 'col-check';
            selectAllTh.appendChild(selectAllCheckbox);
            const nameTh = document.createElement('th');
            nameTh.textContent = '테이블명';
            const commentTh = document.createElement('th');
            commentTh.textContent = '설명';
            theadRow.appendChild(selectAllTh);
            theadRow.appendChild(nameTh);
            theadRow.appendChild(commentTh);

            const thead = document.createElement('thead');
            thead.appendChild(theadRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            filtered.forEach(t => {
                const tr = document.createElement('tr');

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = selectedTables.has(t.name);

                const toggle = () => {
                    checkbox.checked = !checkbox.checked;
                    if (checkbox.checked) {
                        selectedTables.add(t.name);
                    } else {
                        selectedTables.delete(t.name);
                    }
                    renderSelectedTables();
                };

                checkbox.onclick = (event) => {
                    // 체크박스 자체 클릭은 아래 tr onclick과 중복 토글되지 않도록 여기서 바로 처리하고 전파를 막는다
                    event.stopPropagation();
                    if (checkbox.checked) {
                        selectedTables.add(t.name);
                    } else {
                        selectedTables.delete(t.name);
                    }
                    renderSelectedTables();
                };
                tr.onclick = toggle;

                const checkTd = document.createElement('td');
                checkTd.className = 'col-check';
                checkTd.appendChild(checkbox);

                const nameTd = document.createElement('td');
                nameTd.textContent = t.name;

                const commentTd = document.createElement('td');
                commentTd.className = 'table-comment';
                commentTd.textContent = t.comment || '';

                tr.appendChild(checkTd);
                tr.appendChild(nameTd);
                tr.appendChild(commentTd);
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);

            tableListEl.innerHTML = '';
            tableListEl.appendChild(table);
        }

        // 체크된 테이블만 따로 칩 형태로 보여준다. 칩의 x를 누르면 선택 해제된다.
        function renderSelectedTables() {
            const selectedEl = document.getElementById('selected-tables');
            const countEl = document.getElementById('selected-tables-count');
            const clearBtn = document.getElementById('clear-selected-tables-btn');
            countEl.textContent = selectedTables.size > 0 ? `(${selectedTables.size}개 선택됨)` : '';
            clearBtn.disabled = selectedTables.size === 0;

            if (selectedTables.size === 0) {
                selectedEl.innerHTML = '<span class="placeholder">선택된 테이블이 없습니다.</span>';
                return;
            }

            selectedEl.innerHTML = '';
            Array.from(selectedTables).forEach(tableName => {
                const chip = document.createElement('span');
                chip.className = 'table-chip';
                chip.appendChild(document.createTextNode(tableName));

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'table-chip-remove';
                removeBtn.textContent = '×';
                removeBtn.onclick = () => {
                    selectedTables.delete(tableName);
                    renderSelectedTables();
                    renderTableList();
                };

                chip.appendChild(removeBtn);
                selectedEl.appendChild(chip);
            });
        }

        // 선택된 테이블을 전부 해제한다.
        function clearSelectedTables() {
            if (selectedTables.size === 0) {
                return;
            }
            if (!confirm(`선택된 테이블 ${selectedTables.size}개를 모두 해제하시겠습니까?`)) {
                return;
            }
            selectedTables.clear();
            renderSelectedTables();
            renderTableList();
        }

        // 채팅 화면과 동일한 경험: Enter로 바로 전송, Shift+Enter로 줄바꿈.
        function handleSqlRequestKeyPress(event) {
            if (event.key === 'Enter') {
                if (event.shiftKey) {
                    return;
                }
                event.preventDefault();
                generateSql();
            }
        }

        function generateSql() {
            const connectionId = document.getElementById('connection-select').value;
            const nlRequestEl = document.getElementById('nl-request');
            const naturalLanguageRequest = nlRequestEl.value.trim();
            const statusEl = document.getElementById('generate-status');
            const generateBtn = document.getElementById('generate-btn');

            if (!connectionId) {
                statusEl.textContent = 'DB 연결을 먼저 선택하세요.';
                statusEl.className = 'status-text error';
                return;
            }
            if (selectedTables.size === 0) {
                statusEl.textContent = '테이블을 하나 이상 선택하세요.';
                statusEl.className = 'status-text error';
                return;
            }
            if (!naturalLanguageRequest) {
                statusEl.textContent = '원하는 내용을 입력하세요.';
                statusEl.className = 'status-text error';
                return;
            }

            generateBtn.disabled = true;
            statusEl.textContent = '';
            const thinkingIntervalId = startSqlThinkingIndicator();

            fetch('/api/sqlgen/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    connectionId: Number(connectionId),
                    tableNames: Array.from(selectedTables),
                    naturalLanguageRequest
                })
            })
                .then(res => res.json().then(body => ({ ok: res.ok, body })))
                .then(({ ok, body }) => {
                    stopSqlThinkingIndicator(thinkingIntervalId);
                    generateBtn.disabled = false;
                    if (!ok) {
                        statusEl.textContent = body.error || 'SQL 생성 실패';
                        statusEl.className = 'status-text error';
                        return;
                    }
                    statusEl.textContent = '';
                    appendSqlHistoryEntry(naturalLanguageRequest, body.sql);
                    nlRequestEl.value = '';
                })
                .catch(err => {
                    stopSqlThinkingIndicator(thinkingIntervalId);
                    generateBtn.disabled = false;
                    statusEl.textContent = 'SQL 생성 중 오류: ' + err.message;
                    statusEl.className = 'status-text error';
                });
        }

        // 응답이 오기 전까지 점 애니메이션 + 순환 문구로 뭔가 진행 중임을 이력 영역에 바로 보여준다.
        function startSqlThinkingIndicator() {
            const historyEl = document.getElementById('sql-history');
            const placeholder = historyEl.querySelector('.placeholder');
            if (placeholder) {
                placeholder.remove();
            }

            const phrases = ['테이블 스키마를 확인하고 있어요...', 'SQL을 작성하고 있어요...', '조금만 더 기다려주세요...'];

            const entry = document.createElement('div');
            entry.id = 'sql-thinking-entry';
            entry.className = 'sql-history-entry';
            entry.innerHTML = '<div class="thinking-indicator">' +
                '<span class="thinking-dots"><span></span><span></span><span></span></span>' +
                '<span class="thinking-text">' + phrases[0] + '</span></div>';
            historyEl.appendChild(entry);
            historyEl.scrollTop = historyEl.scrollHeight;

            let index = 0;
            return setInterval(() => {
                index = (index + 1) % phrases.length;
                const textEl = entry.querySelector('.thinking-text');
                if (textEl) {
                    textEl.textContent = phrases[index];
                }
            }, 2500);
        }

        function stopSqlThinkingIndicator(intervalId) {
            clearInterval(intervalId);
            const entry = document.getElementById('sql-thinking-entry');
            if (entry) {
                entry.remove();
            }
        }

        // 채팅처럼 질의 하나마다 결과를 이력에 이어붙인다(기존 결과를 덮어쓰지 않음).
        function appendSqlHistoryEntry(naturalLanguageRequest, sql) {
            const historyEl = document.getElementById('sql-history');
            const placeholder = historyEl.querySelector('.placeholder');
            if (placeholder) {
                placeholder.remove();
            }

            const entry = document.createElement('div');
            entry.className = 'sql-history-entry';

            const questionEl = document.createElement('div');
            questionEl.className = 'sql-history-question';
            questionEl.textContent = naturalLanguageRequest;

            const sqlWrapper = document.createElement('div');
            sqlWrapper.className = 'sql-result-wrapper';

            const sqlEl = document.createElement('pre');
            sqlEl.className = 'sql-result';
            sqlEl.textContent = sql;

            const copyBtn = document.createElement('button');
            copyBtn.type = 'button';
            copyBtn.className = 'btn sql-result-copy-btn';
            copyBtn.textContent = '복사';
            copyBtn.onclick = () => copyText(sql);

            sqlWrapper.appendChild(sqlEl);
            sqlWrapper.appendChild(copyBtn);

            entry.appendChild(questionEl);
            entry.appendChild(sqlWrapper);
            historyEl.appendChild(entry);
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        function copyText(text) {
            navigator.clipboard.writeText(text)
                .then(() => alert('복사되었습니다.'))
                .catch(err => alert('복사 실패: ' + err.message));
        }
    </script>
</body>
</html>
